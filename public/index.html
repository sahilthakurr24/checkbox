<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>1 Million check Boxes</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Checkboxes</h1>
    <div id="error-toast"></div>
    <div id="container">
      <script src="/socket.io/socket.io.js"></script>
      <script>
        const socket = io();
        const container = document.getElementById("container");
        const CHECKBOX_COUNT = 160;

        socket.on("server:error", (data) => {
          const { error } = data;
          const toast = document.getElementById("error-toast");
          toast.textContent = error;
          toast.classList.add("show");
          setTimeout(() => {
            toast.classList.remove("show");
          }, 3000);
        });

        socket.on("server:checked:change", (data) => {
          console.log(data);
          const { index, checked } = data;
          const input = document.getElementById(`checkbox-${index}`);
          if (input) {
            input.checked = checked;
          }
        });

        window.addEventListener("load", async () => {
          const response = await fetch("/checkbox", { method: "GET" });
          const data = await response.json();
          console.log(data);

          if (data && data.checkBoxes) {
            data.checkBoxes.forEach((serverVal, index) => {
              const input = document.createElement("input");
              input.id = `checkbox-${index}`;
              input.type = "checkbox";
              input.checked = serverVal;

              input.addEventListener("change", (e) => {
                const checked = e.target.checked;
                socket.emit("client:checked:change", { index, checked });
                console.log(checked, index);
              });

              container.appendChild(input);
            });
          }
        });
      </script>
    </div>
  </body>
</html>
